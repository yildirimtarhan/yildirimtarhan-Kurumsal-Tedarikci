<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Hesap Yönetimi - Kurumsal Tedarikçi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { transition: all 0.3s; }
        .sidebar-collapsed { width: 70px; }
        .sidebar-expanded { width: 260px; }
        .content-area { transition: margin-left 0.3s; }
        .risk-yuksek { background: #fee2e2; color: #991b1b; }
        .risk-orta { background: #fef3c7; color: #92400e; }
        .risk-dusuk { background: #dcfce7; color: #166534; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar sidebar-expanded fixed left-0 top-0 h-full bg-slate-900 text-white z-50 overflow-y-auto">
        <div class="p-4 flex items-center justify-between border-b border-slate-700">
            <div class="flex items-center gap-3 logo-full">
                <i class="fas fa-building-columns text-2xl text-blue-400"></i>
                <span class="font-bold text-lg">Kurumsal</span>
            </div>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <nav class="mt-6 px-2">
            <a href="panel.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-slate-800 hover:text-white rounded-lg mb-1">
                <i class="fas fa-home w-5"></i>
                <span class="menu-text">Ana Sayfa</span>
            </a>
            <a href="cari-yonetim.html" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg mb-1">
                <i class="fas fa-users w-5"></i>
                <span class="menu-text">Cari Hesaplar</span>
            </a>
            <a href="fatura-yonetim.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-slate-800 hover:text-white rounded-lg mb-1">
                <i class="fas fa-file-invoice w-5"></i>
                <span class="menu-text">Faturalar</span>
            </a>
            <a href="tahsilat-yonetim.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-slate-800 hover:text-white rounded-lg mb-1">
                <i class="fas fa-money-bill-wave w-5"></i>
                <span class="menu-text">Tahsilatlar</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div id="content" class="content-area ml-[260px] p-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Cari Hesap Yönetimi</h1>
                <p class="text-gray-500">Müşteri cari hesapları, bakiye takibi ve risk yönetimi</p>
            </div>
            <button onclick="openModal('yeniCariModal')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                <i class="fas fa-plus"></i> Yeni Cari
            </button>
        </div>

        <!-- Özet Kartlar -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-500 text-sm">Toplam Cari</p>
                        <h3 class="text-2xl font-bold text-gray-800" id="toplamCari">0</h3>
                    </div>
                    <div class="bg-blue-100 p-2 rounded-lg">
                        <i class="fas fa-users text-blue-600"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-500 text-sm">Toplam Bakiye</p>
                        <h3 class="text-2xl font-bold text-green-600" id="toplamBakiye">₺0,00</h3>
                    </div>
                    <div class="bg-green-100 p-2 rounded-lg">
                        <i class="fas fa-wallet text-green-600"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-500 text-sm">Riskli Cariler</p>
                        <h3 class="text-2xl font-bold text-red-600" id="riskliCari">0</h3>
                    </div>
                    <div class="bg-red-100 p-2 rounded-lg">
                        <i class="fas fa-exclamation-triangle text-red-600"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-500 text-sm">Gecikmiş Borç</p>
                        <h3 class="text-2xl font-bold text-orange-600" id="gecikmisBorc">₺0,00</h3>
                    </div>
                    <div class="bg-orange-100 p-2 rounded-lg">
                        <i class="fas fa-clock text-orange-600"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtreler -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6">
            <div class="flex flex-wrap gap-4">
                <div class="flex-1 min-w-[200px]">
                    <input type="text" id="searchInput" placeholder="Cari ara (unvan, VKN, email)..." 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <select id="riskFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">Tüm Risk Durumları</option>
                    <option value="GÜVENLİ">Güvenli</option>
                    <option value="DİKKAT">Dikkat</option>
                    <option value="RİSKLİ">Riskli</option>
                </select>
                <button onclick="loadCariler()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-filter"></i> Filtrele
                </button>
            </div>
        </div>

        <!-- Cari Listesi -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Firma</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase">VKN/TCKN</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase">İletişim</th>
                            <th class="px-4 py-3 text-right text-xs font-semibold text-gray-600 uppercase">Bakiye</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase">Risk</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase">İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="cariListesi" class="divide-y divide-gray-100">
                        <!-- JavaScript ile doldurulacak -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Yeni Cari Modal -->
    <div id="yeniCariModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-xl font-bold">Yeni Cari Hesap</h2>
                <button onclick="closeModal('yeniCariModal')" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="yeniCariForm" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Firma Ünvanı *</label>
                        <input type="text" name="firmaUnvan" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">VKN/TCKN *</label>
                        <input type="text" name="vknTckn" required maxlength="11" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-Fatura Etiketi (PK)</label>
                    <input type="text" name="etiket" placeholder="urn:mail:pk@taxten.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Telefon</label>
                        <input type="tel" name="telefon" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">E-posta</label>
                        <input type="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="border-t border-gray-200 pt-4">
                    <h3 class="font-semibold text-gray-800 mb-3">Adres Bilgileri</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">İl</label>
                            <input type="text" name="adres.il" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">İlçe</label>
                            <input type="text" name="adres.ilce" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Adres</label>
                            <textarea name="adres.cadde" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-200 pt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kredi Limiti (₺)</label>
                    <input type="number" name="krediLimiti" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeModal('yeniCariModal')" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">İptal</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';
        let currentPage = 1;
        let sidebarExpanded = true;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const content = document.getElementById('content');
            sidebarExpanded = !sidebarExpanded;
            
            if (sidebarExpanded) {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
                content.style.marginLeft = '260px';
                document.querySelectorAll('.menu-text').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.logo-full span').forEach(el => el.style.display = 'block');
            } else {
                sidebar.classList.remove('sidebar-expanded');
                sidebar.classList.add('sidebar-collapsed');
                content.style.marginLeft = '70px';
                document.querySelectorAll('.menu-text').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.logo-full span').forEach(el => el.style.display = 'none');
            }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function loadCariler() {
            try {
                const search = document.getElementById('searchInput').value;
                const risk = document.getElementById('riskFilter').value;
                
                const response = await fetch(`${API_URL}/cari/list?page=${currentPage}&search=${search}&riskDurumu=${risk}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    renderCariList(data.data);
                    updateStats(data.data);
                }
            } catch (error) {
                console.error('Cari yükleme hatası:', error);
            }
        }

        function renderCariList(cariler) {
            const tbody = document.getElementById('cariListesi');
            tbody.innerHTML = cariler.map(cari => `
                <tr class="hover:bg-gray-50 fade-in">
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
                                ${cari.firmaUnvan.charAt(0)}
                            </div>
                            <div>
                                <p class="font-medium text-gray-800">${cari.firmaUnvan}</p>
                                <p class="text-xs text-gray-500">${cari.etiket || 'E-fatura etiketi yok'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600">${cari.vknTckn}</td>
                    <td class="px-4 py-3 text-sm">
                        <div class="text-gray-600"><i class="fas fa-phone text-xs mr-1"></i> ${cari.telefon || '-'}</div>
                        <div class="text-gray-500 text-xs"><i class="fas fa-envelope text-xs mr-1"></i> ${cari.email || '-'}</div>
                    </td>
                    <td class="px-4 py-3 text-right font-medium ${cari.bakiye >= 0 ? 'text-green-600' : 'text-red-600'}">
                        ₺${cari.bakiye.toLocaleString('tr-TR', {minimumFractionDigits: 2})}
                    </td>
                    <td class="px-4 py-3 text-center">
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${getRiskClass(cari.riskDurumu)}">
                            ${cari.riskDurumu}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="viewCari('${cari._id}')" class="text-blue-600 hover:text-blue-800 mx-1" title="Detay">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="viewEkstre('${cari._id}')" class="text-green-600 hover:text-green-800 mx-1" title="Ekstre">
                            <i class="fas fa-file-invoice-dollar"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function getRiskClass(risk) {
            if (risk === 'RİSKLİ') return 'risk-yuksek';
            if (risk === 'DİKKAT') return 'risk-orta';
            return 'risk-dusuk';
        }

        function updateStats(cariler) {
            document.getElementById('toplamCari').textContent = cariler.length;
            const toplamBakiye = cariler.reduce((sum, c) => sum + c.bakiye, 0);
            document.getElementById('toplamBakiye').textContent = '₺' + toplamBakiye.toLocaleString('tr-TR', {minimumFractionDigits: 2});
            const riskli = cariler.filter(c => c.riskDurumu === 'RİSKLİ').length;
            document.getElementById('riskliCari').textContent = riskli;
            const gecikmis = cariler.reduce((sum, c) => sum + (c.gecikmisBorc || 0), 0);
            document.getElementById('gecikmisBorc').textContent = '₺' + gecikmis.toLocaleString('tr-TR', {minimumFractionDigits: 2});
        }

        document.getElementById('yeniCariForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch(`${API_URL}/cari/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (result.success) {
                    closeModal('yeniCariModal');
                    loadCariler();
                    e.target.reset();
                } else {
                    alert(result.message || 'Hata oluştu');
                }
            } catch (error) {
                alert('Kayıt hatası: ' + error.message);
            }
        });

        function viewCari(id) {
            window.location.href = `cari-detay.html?id=${id}`;
        }

        function viewEkstre(id) {
            window.location.href = `cari-ekstre.html?id=${id}`;
        }

        document.addEventListener('DOMContentLoaded', loadCariler);
    </script>
</body>
</html>
