<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Profilim - Kurumsal Tedarikçi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: "Inter", Arial, sans-serif;
      background: linear-gradient(to right, #eef2ff, #f8fafc);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    .profile-card {
      background: white;
      border-radius: 20px;
      padding: 35px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .top-area {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .avatar {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: white;
    }

    .user-info h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: #111827;
    }

    .user-info p {
      margin: 4px 0;
      color: #6b7280;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      margin-top: 6px;
      background: #e0e7ff;
      color: #4338ca;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .badge.kurumsal {
      background: #dbeafe;
      color: #1e40af;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 25px;
    }

    .box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
    }

    .box h4 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .box p {
      margin: 0;
      font-size: 14px;
      color: #374151;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: 0.2s;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-primary:hover {
      background: #4f46e5;
    }

    .btn-secondary {
      background: #10b981;
      color: white;
    }

    .btn-secondary:hover {
      background: #059669;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    @media(max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="profile-card">

    <!-- ÜST PROFİL ALANI -->
    <div class="top-area">
      <div class="avatar" id="avatarLetter">U</div>

      <div class="user-info">
        <h2 id="userName">Kullanıcı</h2>
        <p id="userEmail">email@example.com</p>
        <span class="badge" id="userType">Üyelik Tipi</span>
      </div>
    </div>

    <!-- BİLGİLER -->
    <div class="grid">

      <div class="box">
        <h4>📞 Telefon</h4>
        <p id="userPhone">-</p>
      </div>

      <div class="box">
        <h4>🏢 Firma</h4>
        <p id="userCompany">-</p>
        <button onclick="showEditModal()" style="margin-top:8px;font-size:12px;padding:4px 10px;background:#6366f1;color:white;border:none;border-radius:6px;cursor:pointer;">Düzenle</button>
      </div>

      <div class="box">
        <h4>🧾 Fatura Adresi</h4>
        <p id="invoiceAddress">Adres yok</p>
      </div>

      <div class="box">
        <h4>🚚 Teslimat Adresi</h4>
        <p id="deliveryAddress">Adres yok</p>
      </div>

    </div>

    <!-- BUTONLAR -->
    <div class="buttons">
      <a href="urunler.html" class="btn btn-primary">🛒 Alışverişe Başla</a>
      <a href="sepet.html" class="btn btn-primary" style="background: #8b5cf6;">🛍️ Sepetim</a>
      <a href="siparisler.html" class="btn btn-secondary">📦 Siparişlerim</a>
      <a href="musteri/faturalarim.html" class="btn btn-info" style="background: #17a2b8; color: white;">
        <i class="fas fa-file-invoice"></i> Faturalarım
    </a>
          <button onclick="logout()" class="btn btn-danger">🚪 Çıkış Yap</button>
    </div>

  </div>
</div>

<!-- Profil Düzenleme Modalı -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:16px;padding:30px;width:90%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <h3 style="margin:0 0 20px;font-size:18px;">Profil Bilgilerini Düzenle</h3>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Üyelik Tipi</label>
      <select id="editUyelikTipi" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;">
        <option value="bireysel">Bireysel</option>
        <option value="kurumsal">Kurumsal</option>
      </select>
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Firma Adı</label>
      <input id="editFirma" type="text" placeholder="Firma / Şirket Adı" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Vergi No</label>
      <input id="editVergiNo" type="text" placeholder="Vergi No" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Vergi Dairesi</label>
      <input id="editVergiDairesi" type="text" placeholder="Vergi Dairesi" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;box-sizing:border-box;">
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="saveProfile()" style="flex:1;padding:12px;background:#6366f1;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;">Kaydet</button>
      <button onclick="closeEditModal()" style="flex:1;padding:12px;background:#f3f4f6;color:#374151;border:none;border-radius:10px;font-weight:700;cursor:pointer;">İptal</button>
    </div>
  </div>
</div>

<script>
  const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://backend-api-7s13.onrender.com/api';

  function showEditModal() {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('editUyelikTipi').value = user.uyelikTipi || 'bireysel';
    document.getElementById('editFirma').value = user.firma || '';
    document.getElementById('editVergiNo').value = user.vergiNo || '';
    document.getElementById('editVergiDairesi').value = user.vergiDairesi || '';
    document.getElementById('editModal').style.display = 'flex';
  }

  function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
  }

  async function saveProfile() {
    const token = localStorage.getItem('token');
    const uyelikTipi = document.getElementById('editUyelikTipi').value;
    const firma = document.getElementById('editFirma').value.trim();
    const vergiNo = document.getElementById('editVergiNo').value.trim();
    const vergiDairesi = document.getElementById('editVergiDairesi').value.trim();

    try {
      const res = await fetch(`${API_URL}/auth/profile`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ uyelikTipi, firma, vergiNo, vergiDairesi })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('user', JSON.stringify(data.user));
        closeEditModal();
        loadUserProfile();
      } else {
        alert('Hata: ' + data.message);
      }
    } catch (e) {
      alert('Güncelleme başarısız');
    }
  }
  // Kullanıcı bilgilerini getir
  async function loadUserProfile() {
    const token = localStorage.getItem("token");
    const userData = localStorage.getItem("user");

    if (!token || !userData) {
      alert("Giriş yapmanız gerekiyor!");
      window.location.href = "giris.html";
      return;
    }

    const user = JSON.parse(userData);

    // Avatar Harfi
    document.getElementById("avatarLetter").innerText =
      user.ad ? user.ad.charAt(0).toUpperCase() : "U";

    // Üst bilgiler
    document.getElementById("userName").innerText = user.ad || "Kullanıcı";
    document.getElementById("userEmail").innerText = user.email || "";
    
    // Üyelik tipi badge'i
    const userTypeEl = document.getElementById("userType");
    if (user.uyelikTipi === 'kurumsal') {
      userTypeEl.innerText = "Kurumsal Üye";
      userTypeEl.classList.add('kurumsal');
    } else {
      userTypeEl.innerText = "Bireysel Üye";
    }

    // Detaylar
    document.getElementById("userPhone").innerText = user.telefon || "-";
    document.getElementById("userCompany").innerText = user.firma || (user.uyelikTipi === 'kurumsal' ? "-" : "Bireysel Üye");
    
    document.getElementById("invoiceAddress").innerText = 
      user.faturaAdresi || "Adres yok";

    document.getElementById("deliveryAddress").innerText = 
      user.teslimatAdresi || user.faturaAdresi || "Adres yok";

    // Güncel kullanıcı bilgilerini API'den çek (opsiyonel)
    try {
      const response = await fetch(`${API_URL}/auth/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        const data = await response.json();
        if (data.success) {
          // LocalStorage'ı güncelle
          localStorage.setItem("user", JSON.stringify(data.user));
          
          // Ekranı güncelle
          document.getElementById("userPhone").innerText = data.user.telefon || "-";
          document.getElementById("userCompany").innerText = data.user.firma || "-";
          document.getElementById("invoiceAddress").innerText =
            (data.user.faturaAdresi && data.user.faturaAdresi.acikAdres)
              ? data.user.faturaAdresi.acikAdres
              : (data.user.faturaAdresi || "Adres yok");
          document.getElementById("deliveryAddress").innerText =
            (data.user.teslimatAdresi && data.user.teslimatAdresi.acikAdres)
              ? data.user.teslimatAdresi.acikAdres
              : (data.user.teslimatAdresi || "Adres yok");

          // Badge'i API verisinden güncelle
          const typeEl = document.getElementById("userType");
          if (data.user.uyelikTipi === 'kurumsal') {
            typeEl.innerText = "Kurumsal Üye";
            typeEl.classList.add('kurumsal');
          } else {
            typeEl.innerText = "Bireysel Üye";
            typeEl.classList.remove('kurumsal');
          }
          document.getElementById("userName").innerText = data.user.ad || "Kullanıcı";
        }
      }
    } catch (error) {
      console.log("Profil güncelleme hatası:", error);
    }
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    localStorage.removeItem("cart");
    alert("Çıkış yapıldı");
    window.location.href = "index.html";
  }

  // Sayfa yüklendiğinde
  loadUserProfile();
</script>

</body>
</html>
