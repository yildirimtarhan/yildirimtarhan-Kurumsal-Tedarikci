<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Destek Sorularım - Kurumsal Tedarikçi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height: 100vh; padding-top: 80px; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: white; box-shadow: 0 2px 20px rgba(0,0,0,0.1); z-index: 1000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { font-size: 22px; font-weight: 800; color: #1f2937; text-decoration: none; }
        .logo span { color: #6366f1; }
        .nav-back { display: flex; align-items: center; gap: 8px; color: #6366f1; text-decoration: none; font-weight: 600; font-size: 14px; padding: 8px 16px; border-radius: 8px; transition: background 0.3s; }
        .nav-back:hover { background: #f3f4f6; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .page-header { margin-bottom: 25px; }
        .page-header h1 { font-size: 2rem; color: #1f2937; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .page-header p { color: #6b7280; font-size: 1rem; }
        .btn-yeni { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: #6366f1; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 25px; transition: all 0.3s; }
        .btn-yeni:hover { background: #4f46e5; transform: translateY(-2px); }
        .ticket-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.3s; }
        .ticket-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-color: #6366f1; }
        .ticket-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; }
        .ticket-konu { font-size: 1.1rem; font-weight: 700; color: #1f2937; }
        .ticket-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 13px; color: #6b7280; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-acik { background: #d1fae5; color: #065f46; }
        .badge-cevaplandi { background: #dbeafe; color: #1e40af; }
        .badge-kapali { background: #f3f4f6; color: #4b5563; }
        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 16px; }
        .empty-state i { font-size: 64px; color: #d1d5db; margin-bottom: 20px; }
        .empty-state h3 { font-size: 1.3rem; color: #374151; margin-bottom: 8px; }
        .empty-state p { color: #6b7280; margin-bottom: 20px; }
        .loading { text-align: center; padding: 40px; color: #6b7280; }
        .loading i { font-size: 36px; margin-bottom: 15px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 1.25rem; color: #1f2937; }
        .modal-close { background: none; border: none; font-size: 24px; color: #9ca3af; cursor: pointer; padding: 4px; }
        .modal-close:hover { color: #374151; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #6366f1; }
        .btn-submit { width: 100%; padding: 14px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        .btn-submit:hover { background: #4f46e5; }

        /* Detay görünümü */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .list-view { display: block; }
        .list-view.hidden { display: none; }
        .mesaj-kutusu { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .mesaj { padding: 14px; border-radius: 12px; margin-bottom: 10px; }
        .mesaj-kullanici { background: #e0e7ff; margin-left: 20px; }
        .mesaj-destek { background: #d1fae5; margin-right: 20px; }
        .mesaj-meta { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Kurumsal<span>Tedarikçi</span></a>
        <a href="profil.html" class="nav-back"><i class="fas fa-arrow-left"></i> Profil'e Dön</a>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-headset"></i> Destek Sorularım</h1>
            <p>Sorularınızı buradan takip edebilir, yeni destek talebi oluşturabilirsiniz</p>
        </div>

        <button class="btn-yeni" onclick="openYeniTalepModal()">
            <i class="fas fa-plus"></i> Yeni Destek Talebi
        </button>

        <!-- Liste görünümü -->
        <div id="listView" class="list-view">
            <div id="ticketList">
                <div class="loading"><i class="fas fa-spinner"></i><p>Yükleniyor...</p></div>
            </div>
        </div>

        <!-- Detay görünümü -->
        <div id="detailView" class="detail-view">
            <button class="btn-yeni" style="background:#6b7280;margin-bottom:15px;" onclick="showList()">
                <i class="fas fa-arrow-left"></i> Listeye Dön
            </button>
            <div id="ticketDetail"></div>
        </div>
    </div>

    <!-- Yeni Talep Modal -->
    <div class="modal" id="yeniTalepModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Yeni Destek Talebi</h2>
                <button class="modal-close" onclick="closeYeniTalepModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="yeniTalepForm" onsubmit="submitYeniTalep(event)">
                    <div class="form-group">
                        <label>Konu *</label>
                        <input type="text" id="talepKonu" placeholder="Örn: Siparişim hakkında soru" required>
                    </div>
                    <div class="form-group">
                        <label>Sipariş No (opsiyonel)</label>
                        <input type="text" id="talepSiparisNo" placeholder="İlgili sipariş numarası varsa">
                    </div>
                    <div class="form-group">
                        <label>Mesajınız *</label>
                        <textarea id="talepMesaj" placeholder="Sorunuzu veya talebinizi detaylı yazın..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Gönder</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://backend-api-7s13.onrender.com/api';
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');

        if (!token) {
            alert('Giriş yapmanız gerekiyor!');
            window.location.href = 'giris.html';
        }

        let tickets = [];

        async function loadTickets() {
            const container = document.getElementById('ticketList');
            try {
                const res = await fetch(API_URL + '/support', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Yüklenemedi');
                tickets = data.tickets || [];
                renderList();
            } catch (e) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Yüklenemedi</h3><p>' + (e.message || 'Bağlantı hatası') + '</p></div>';
            }
        }

        function renderList() {
            const container = document.getElementById('ticketList');
            if (tickets.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <h3>Henüz destek talebiniz yok</h3>
                        <p>Sorularınız için yeni bir destek talebi oluşturun</p>
                        <button class="btn-yeni" onclick="openYeniTalepModal()"><i class="fas fa-plus"></i> Yeni Talep Oluştur</button>
                    </div>`;
                return;
            }
            container.innerHTML = tickets.map(t => `
                <div class="ticket-card" onclick="showDetail('${t._id}')">
                    <div class="ticket-header">
                        <span class="ticket-konu">${escapeHtml(t.konu)}</span>
                        <span class="badge badge-${t.durum === 'açık' ? 'acik' : t.durum === 'cevaplandı' ? 'cevaplandi' : 'kapali'}">${t.durum}</span>
                    </div>
                    <div class="ticket-meta">
                        <span><i class="far fa-calendar"></i> ${new Date(t.createdAt).toLocaleDateString('tr-TR', { day:'numeric', month:'short', year:'numeric' })}</span>
                        ${t.siparisNo ? '<span><i class="fas fa-box"></i> Sipariş: ' + escapeHtml(t.siparisNo) + '</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        async function showDetail(id) {
            try {
                const res = await fetch(API_URL + '/support/' + id, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Yüklenemedi');
                renderDetail(data.ticket);
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('detailView').classList.add('active');
            } catch (e) {
                alert(e.message || 'Talep yüklenemedi');
            }
        }

        function renderDetail(t) {
            const durumClass = t.durum === 'açık' ? 'acik' : t.durum === 'cevaplandı' ? 'cevaplandi' : 'kapali';
            const mesajlarHtml = (t.mesajlar || []).map(m => `
                <div class="mesaj mesaj-${m.from}">
                    <div class="mesaj-meta">${m.from === 'kullanici' ? 'Siz' : 'Destek'} • ${new Date(m.createdAt).toLocaleString('tr-TR')}</div>
                    <div>${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>
                </div>
            `).join('');

            document.getElementById('ticketDetail').innerHTML = `
                <div class="ticket-card" style="cursor:default;">
                    <div class="ticket-header">
                        <span class="ticket-konu">${escapeHtml(t.konu)}</span>
                        <span class="badge badge-${durumClass}">${t.durum}</span>
                    </div>
                    <div class="ticket-meta" style="margin-bottom:20px;">
                        <span><i class="far fa-calendar"></i> ${new Date(t.createdAt).toLocaleDateString('tr-TR')}</span>
                        ${t.siparisNo ? '<span><i class="fas fa-box"></i> Sipariş: ' + escapeHtml(t.siparisNo) + '</span>' : ''}
                    </div>
                    <div class="mesaj-kutusu">${mesajlarHtml || '<p style="color:#6b7280;">Henüz mesaj yok.</p>'}</div>
                    ${t.durum !== 'kapalı' ? `
                        <form onsubmit="submitMesaj(event, '${t._id}')">
                            <div class="form-group">
                                <label>Yanıt ekle</label>
                                <textarea id="replyMesaj" placeholder="Mesajınızı yazın..." rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn-submit"><i class="fas fa-reply"></i> Gönder</button>
                        </form>
                    ` : ''}
                </div>
            `;
        }

        function showList() {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('detailView').classList.remove('active');
            loadTickets();
        }

        function openYeniTalepModal() {
            document.getElementById('yeniTalepModal').classList.add('active');
            document.getElementById('yeniTalepForm').reset();
        }

        function closeYeniTalepModal() {
            document.getElementById('yeniTalepModal').classList.remove('active');
        }

        async function submitYeniTalep(e) {
            e.preventDefault();
            const konu = document.getElementById('talepKonu').value.trim();
            const mesaj = document.getElementById('talepMesaj').value.trim();
            const siparisNo = document.getElementById('talepSiparisNo').value.trim();
            if (!konu || !mesaj) { alert('Konu ve mesaj zorunludur'); return; }
            try {
                const res = await fetch(API_URL + '/support', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ konu, mesaj, siparisNo })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Gönderilemedi');
                alert('Destek talebiniz alındı. En kısa sürede size dönüş yapacağız.');
                closeYeniTalepModal();
                loadTickets();
            } catch (err) {
                alert(err.message || 'Bir hata oluştu');
            }
        }

        async function submitMesaj(e, ticketId) {
            e.preventDefault();
            const mesaj = document.getElementById('replyMesaj').value.trim();
            if (!mesaj) return;
            try {
                const res = await fetch(API_URL + '/support/' + ticketId + '/mesaj', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ mesaj })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Gönderilemedi');
                showDetail(ticketId);
            } catch (err) {
                alert(err.message || 'Bir hata oluştu');
            }
        }

        function escapeHtml(s) {
            if (!s) return '';
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        document.getElementById('yeniTalepModal').addEventListener('click', function(e) {
            if (e.target === this) closeYeniTalepModal();
        });

        loadTickets();
    </script>
</body>
</html>
