<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destek Talepleri - Admin Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --dark: #1e293b;
            --light: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f1f5f9;
            margin: 0;
            display: flex;
        }

        /* Sidebar simple version for this page */
        .sidebar {
            width: 280px;
            background: var(--dark);
            height: 100vh;
            color: white;
            padding: 30px 20px;
            position: fixed;
        }

        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            color: #64748b;
            font-weight: 600;
            border-bottom: 1px solid #f1f5f9;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            color: #1e293b;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-açık { background: #dcfce7; color: #15803d; }
        .badge-beklemede { background: #fef9c3; color: #854d0e; }
        .badge-cevaplandı { background: #dbeafe; color: #1e40af; }
        .badge-çözüldü { background: #f1f5f9; color: #475569; }

        .btn-view {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        /* Modal / Detail Panel */
        #ticketModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 25px;
            background: var(--dark);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 80%;
            padding: 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg.user {
            align-self: flex-start;
            background: white;
            border: 1px solid #e2e8f0;
        }

        .msg.admin {
            align-self: flex-end;
            background: var(--primary);
            color: white;
        }

        .reply-area {
            padding: 25px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 15px;
        }

        textarea {
            flex: 1;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            resize: none;
            height: 60px;
            font-family: inherit;
        }

        .btn-send {
            padding: 0 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <nav>
            <a href="index.html" style="color:white;text-decoration:none;display:block;margin:15px 0;"><i class="fas fa-home"></i> Dashboard</a>
            <a href="cariler.html" style="color:white;text-decoration:none;display:block;margin:15px 0;"><i class="fas fa-users"></i> Cariler</a>
            <a href="destek.html" style="color:var(--primary);text-decoration:none;display:block;margin:15px 0;"><i class="fas fa-headset"></i> Destek Talepleri</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Destek Talepleri</h1>
            <div id="stats"></div>
        </div>

        <div class="card">
            <table id="ticketTable">
                <thead>
                    <tr>
                        <th>Tarih</th>
                        <th>Kullanıcı</th>
                        <th>Konu</th>
                        <th>Durum</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="ticketList">
                    <!-- JS ile dolacak -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="ticketModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Mesaj Detayı</h3>
                <button onclick="closeModal()" style="background:none;border:none;color:white;cursor:pointer;font-size:20px;">&times;</button>
            </div>
            <div id="chatArea" class="chat-area"></div>
            <div class="reply-area">
                <textarea id="replyText" placeholder="Yanıtınızı yazın..."></textarea>
                <button onclick="sendReply()" class="btn-send">Gönder</button>
            </div>
            <div style="padding:15px;display:flex;gap:10px;background:#f1f5f9;">
                <button onclick="updateStatus('çözüldü')" class="btn-view" style="background:var(--success)">Çözüldü Olarak İşaretle</button>
                <button onclick="updateStatus('kapalı')" class="btn-view" style="background:var(--danger)">Kapat</button>
            </div>
        </div>
    </div>

    <script>
        let currentTicketId = null;

        async function loadTickets() {
            try {
                const res = await fetch('/api/admin/support/tickets', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') }
                });
                const data = await res.json();
                if (data.success) {
                    const list = document.getElementById('ticketList');
                    list.innerHTML = data.tickets.map(t => `
                        <tr>
                            <td>${new Date(t.createdAt).toLocaleDateString()}</td>
                            <td>${t.userId?.ad || 'Silinmiş Kullanıcı'}</td>
                            <td>${t.konu}</td>
                            <td><span class="badge badge-${t.durum}">${t.durum.toUpperCase()}</span></td>
                            <td><button onclick="viewTicket('${t._id}')" class="btn-view">Görüntüle</button></td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function viewTicket(id) {
            currentTicketId = id;
            try {
                const res = await fetch('/api/admin/support/tickets/' + id, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') }
                });
                const data = await res.json();
                if (data.success) {
                    const t = data.ticket;
                    document.getElementById('modalTitle').innerText = t.konu + ' - ' + t.userId?.ad;
                    const area = document.getElementById('chatArea');
                    area.innerHTML = t.mesajlar.map(m => `
                        <div class="msg ${m.from === 'admin' || m.from === 'destek' ? 'admin' : 'user'}">
                            ${m.text}
                            <div style="font-size:10px;margin-top:5px;opacity:0.7;">${new Date(m.createdAt).toLocaleString()}</div>
                        </div>
                    `).join('');
                    document.getElementById('ticketModal').style.display = 'flex';
                    area.scrollTop = area.scrollHeight;
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function sendReply() {
            const text = document.getElementById('replyText').value;
            if (!text) return;

            try {
                const res = await fetch(`/api/admin/support/tickets/${currentTicketId}/reply`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('adminToken') 
                    },
                    body: JSON.stringify({ mesaj: text })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('replyText').value = '';
                    viewTicket(currentTicketId);
                    loadTickets();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function updateStatus(durum) {
            try {
                const res = await fetch(`/api/admin/support/tickets/${currentTicketId}/status`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('adminToken') 
                    },
                    body: JSON.stringify({ durum })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    loadTickets();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function closeModal() {
            document.getElementById('ticketModal').style.display = 'none';
        }

        // Başlangıç
        if (!localStorage.getItem('adminToken')) {
            window.location.href = 'login.html';
        } else {
            loadTickets();
        }
    </script>
</body>
</html>
