<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Siparişler</title>
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <!-- Fatura Servisi -->
  <script src="../js/fatura-service.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f5f6fa;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #2c3e50;
      color: white;
      height: 100vh;
      padding-top: 20px;
      position: fixed;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      padding: 14px 20px;
      color: white;
      text-decoration: none;
    }

    .sidebar a.active,
    .sidebar a:hover {
      background: #34495e;
    }

    /* Main */
    .main-content {
      margin-left: 250px;
      padding: 25px;
      width: 100%;
    }

    h1 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    /* Table */
    .table-container {
      overflow-x: auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: #34495e;
      color: white;
      padding: 14px;
      text-align: left;
    }

    td {
      padding: 14px;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f9faf9;
    }

    /* Status Badge */
    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      display: inline-block;
    }

    .Yeni { background: #ffeaa7; color: #2d3436; }
    .Hazırlanıyor { background: #74b9ff; color: white; }
    .Kargoya\ Verildi { background: #00b894; color: white; }
    .Teslim\ Edildi { background: #2ecc71; color: white; }
    .İptal\ Edildi { background: #e74c3c; color: white; }

    /* Buttons */
    .btn {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin: 0 2px;
    }

    .btn-detail {
      background: #3498db;
      color: white;
    }

    .btn-kargo {
      background: #e67e22;
      color: white;
    }

    .btn-fatura {
      background: #27ae60;
      color: white;
    }

    .btn-fatura:hover {
      background: #229954;
    }

    .btn-fatura:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 10000;
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }

    .toast.success {
      background: #27ae60;
    }

    .toast.error {
      background: #e74c3c;
    }

    .toast.warning {
      background: #f39c12;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Loading Overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 9998;
      justify-content: center;
      align-items: center;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      width: 90%;
      max-width: 700px;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .close {
      position: absolute;
      right: 20px;
      top: 15px;
      font-size: 28px;
      cursor: pointer;
    }

    input, select {
      padding: 8px;
      border-radius: 6px;
      margin-top: 5px;
      width: 100%;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
    }

    /* Mobile */
    @media(max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
    }
  </style>
</head>

<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Kurumsal Tedarikçi</h2>
    <a href="index.html">Dashboard</a>
    <a href="users.html">Kullanıcılar</a>
    <a href="orders.html" class="active">Siparişler</a>
    <a href="fatura-yonetim.html"><i class="fas fa-file-invoice-dollar"></i> Faturalar</a>
    <a href="cari-yonetim.html"><i class="fas fa-users"></i> Cari Hesaplar</a>
    <a href="tahsilat-yonetim.html"><i class="fas fa-money-bill-wave"></i> Tahsilatlar</a>
    <a href="raporlar.html"><i class="fas fa-chart-bar"></i> Raporlar</a>
    <a href="products.html">Ürünler (ERP)</a>
    <a href="kargo-bildirim.html"><i class="fas fa-truck"></i> Kargo Bildirim</a>
    <a href="products-manage.html"><i class="fas fa-warehouse"></i> Stok Yönetimi</a>
    <a href="paket-yonetim.html"><i class="fas fa-box-open"></i> Paket Yönetimi</a>
    <a href="#" onclick="logout()">Çıkış Yap</a>
  </div>

  <!-- Content -->
  <div class="main-content">
    <h1>📦 Sipariş Yönetimi</h1>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Tutar</th>
            <th>Durum</th>
            <th>Tarih</th>
            <th>İşlem</th>
          </tr>
        </thead>

        <tbody id="ordersBody">
          <tr>
            <td colspan="6" style="text-align:center;">Yükleniyor...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div id="orderModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>📦 Sipariş Detayı</h2>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
  const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://backend-api-7s13.onrender.com/api';
  const token = localStorage.getItem("adminToken");

  if (!token) window.location.href = "login.html";

  function logout() {
    localStorage.removeItem("adminToken");
    window.location.href = "login.html";
  }

  // Toast bildirim fonksiyonu
  function showToast(message, type = 'success') {
    const existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();

    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
      <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
      ${message}
    `;
    document.body.appendChild(toast);

    setTimeout(() => {
      toast.remove();
    }, 5000);
  }

  // Loading göster/gizle
  function showLoading() {
    document.getElementById('loadingOverlay').classList.add('active');
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('active');
  }

  async function loadOrders() {
    try {
      const res = await fetch(`${API_URL}/orders`, {
        headers: { Authorization: "Bearer " + token }
      });

      const data = await res.json();
      const tbody = document.getElementById("ordersBody");

      if (!data.orders || data.orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Sipariş bulunamadı</td></tr>';
        return;
      }

      tbody.innerHTML = data.orders.map(order => {
        // Fatura butonu için uygun durumlar
        const faturaDurumlari = ['Yeni', 'Hazırlanıyor', 'Kargoya Verildi', 'Teslim Edildi'];
        const faturaBtnGoster = faturaDurumlari.includes(order.status);
        
        return `
          <tr>
            <td>${order._id}</td>
            <td>${order.email}</td>
            <td>₺${order.toplam ? order.toplam.toFixed(2) : '0.00'}</td>
            <td><span class="badge ${order.status.replace(/\s+/g, '\\ ')}">${order.status}</span></td>
            <td>${new Date(order.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-detail" onclick="showDetail('${order._id}')">
                <i class="fas fa-eye"></i> Detay
              </button>
              ${faturaBtnGoster ? `
                <button class="btn btn-fatura" onclick="createFaturaFromOrder('${order._id}')" title="Fatura Oluştur">
                  <i class="fas fa-file-invoice"></i> Fatura
                </button>
              ` : ''}
            </td>
          </tr>
        `;
      }).join("");
    } catch (error) {
      console.error('Sipariş yükleme hatası:', error);
      showToast('Siparişler yüklenirken hata oluştu', 'error');
    }
  }

  // Fatura oluşturma fonksiyonu
  async function createFaturaFromOrder(orderId) {
    if (!confirm('Bu sipariş için fatura oluşturmak istiyor musunuz?')) return;
    
    // Fatura tipi seçimi
    const faturaTip = prompt('Fatura Tipi Seçin:\n1 - E-Fatura\n2 - E-Arşiv\n\n(1 veya 2 yazın)', '1');
    if (!faturaTip) return;
    
    const tip = faturaTip === '2' ? 'earsiv' : 'efatura';
    const odemeVadesi = parseInt(prompt('Ödeme Vadesi (gün):', '14')) || 14;
    
    showLoading();
    
    try {
      // Fatura servisi kullanarak oluştur
      const result = await faturaService.createFromSiparis(orderId, {
        tip: tip,
        odemeVadesi: odemeVadesi
      });
      
      hideLoading();
      
      showToast(`✅ Fatura oluşturuldu: ${result.data.faturaNo}`, 'success');
      
      // 2 saniye sonra fatura yönetim sayfasına yönlendir
      setTimeout(() => {
        window.location.href = 'fatura-yonetim.html';
      }, 2000);
      
    } catch (error) {
      hideLoading();
      console.error('Fatura oluşturma hatası:', error);
      showToast('❌ Hata: ' + (error.message || 'Fatura oluşturulamadı'), 'error');
      
      // Eğer fatura servisi çalışmazsa, direkt API çağrısı dene
      try {
        showLoading();
        const response = await fetch(`${API_URL}/faturalar/from-siparis`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            siparisId: orderId,
            tip: tip,
            odemeVadesi: odemeVadesi
          })
        });
        
        const data = await response.json();
        hideLoading();
        
        if (data.success) {
          showToast(`✅ Fatura oluşturuldu: ${data.data.faturaNo}`, 'success');
          setTimeout(() => {
            window.location.href = 'fatura-yonetim.html';
          }, 2000);
        } else {
          throw new Error(data.message);
        }
      } catch (apiError) {
        hideLoading();
        showToast('❌ API Hatası: ' + apiError.message, 'error');
      }
    }
  }

  async function showDetail(id) {
    try {
      const res = await fetch(`${API_URL}/orders/${id}`, {
        headers: { Authorization: "Bearer " + token }
      });

      const { order } = await res.json();

      // Ürün listesi HTML'i oluştur
      let itemsHtml = '';
      if (order.items && order.items.length > 0) {
        itemsHtml = `
          <div style="margin: 20px 0; background: #f8f9fa; padding: 15px; border-radius: 8px;">
            <h3 style="margin-bottom: 15px; color: #2c3e50;">📦 Sipariş Ürünleri</h3>
            <table style="width: 100%; border-collapse: collapse;">
              <thead>
                <tr style="background: #34495e; color: white;">
                  <th style="padding: 10px; text-align: left;">Ürün</th>
                  <th style="padding: 10px; text-align: center;">Adet</th>
                  <th style="padding: 10px; text-align: right;">Birim Fiyat</th>
                  <th style="padding: 10px; text-align: right;">Toplam</th>
                </tr>
              </thead>
              <tbody>
                ${order.items.map(item => `
                  <tr style="border-bottom: 1px solid #dee2e6;">
                    <td style="padding: 10px;">${item.ad || item.name || 'Ürün'}</td>
                    <td style="padding: 10px; text-align: center;">${item.adet || item.quantity || 1}</td>
                    <td style="padding: 10px; text-align: right;">₺${(item.fiyat || item.price || 0).toFixed(2)}</td>
                    <td style="padding: 10px; text-align: right; font-weight: bold;">₺${((item.fiyat || item.price || 0) * (item.adet || item.quantity || 1)).toFixed(2)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            
            <div style="margin-top: 15px; text-align: right; font-size: 16px;">
              <div style="color: #7f8c8d;">Ara Toplam: ₺${order.toplam ? (order.toplam / 1.2).toFixed(2) : '0.00'}</div>
              <div style="color: #7f8c8d;">KDV (%20): ₺${order.toplam ? (order.toplam - (order.toplam / 1.2)).toFixed(2) : '0.00'}</div>
              <div style="font-size: 20px; font-weight: bold; color: #2c3e50; margin-top: 10px;">
                Genel Toplam: ₺${order.toplam ? order.toplam.toFixed(2) : '0.00'}
              </div>
            </div>
          </div>
        `;
      }

      // Fatura bilgisi varsa göster
      let faturaHtml = '';
      if (order.faturaId) {
        faturaHtml = `
          <div style="margin: 20px 0; background: #d4edda; padding: 15px; border-radius: 8px; border-left: 4px solid #28a745;">
            <h4 style="color: #155724; margin-bottom: 10px;"><i class="fas fa-check-circle"></i> Fatura Bilgisi</h4>
            <p style="color: #155724; margin: 0;">
              Bu sipariş için <strong>${order.faturaNo || 'fatura'}</strong> oluşturulmuştur.
              <a href="fatura-yonetim.html?id=${order.faturaId}" style="color: #155724; text-decoration: underline; font-weight: bold;">
                Faturayı Görüntüle
              </a>
            </p>
          </div>
        `;
      }

      document.getElementById("modalBody").innerHTML = `
        <p><b>Sipariş ID:</b> ${order._id}</p>
        <p><b>Email:</b> ${order.email}</p>
        <p><b>Firma:</b> ${order.firmaAdi || '-'}</p>
        <p><b>Telefon:</b> ${order.telefon || '-'}</p>
        <p><b>Tarih:</b> ${new Date(order.createdAt).toLocaleString('tr-TR')}</p>
        
        ${faturaHtml}
        
        <hr style="margin: 20px 0;">
        
        ${itemsHtml}
        
        <hr style="margin: 20px 0;">

        <h3 style="margin-bottom: 15px;">🚚 Kargo Bilgisi</h3>
        
        <label>Durum</label>
        <select id="statusSelect" style="width: 100%; padding: 8px; margin-bottom: 15px;">
          <option ${order.status==="Yeni"?"selected":""}>Yeni</option>
          <option ${order.status==="Hazırlanıyor"?"selected":""}>Hazırlanıyor</option>
          <option ${order.status==="Kargoya Verildi"?"selected":""}>Kargoya Verildi</option>
          <option ${order.status==="Teslim Edildi"?"selected":""}>Teslim Edildi</option>
          <option ${order.status==="İptal Edildi"?"selected":""}>İptal Edildi</option>
        </select>
        <button onclick="updateStatus('${order._id}')" style="background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px;">
          Durum Kaydet
        </button>

        <hr style="margin: 20px 0;">

        <label>Kargo Firması</label>
        <select id="kargoFirma" style="width: 100%; padding: 8px; margin-bottom: 10px;">
          <option value="Yurtiçi Kargo" ${order.kargoBilgisi?.firma === 'Yurtiçi Kargo' ? 'selected' : ''}>Yurtiçi Kargo</option>
          <option value="Aras Kargo" ${order.kargoBilgisi?.firma === 'Aras Kargo' ? 'selected' : ''}>Aras Kargo</option>
          <option value="MNG Kargo" ${order.kargoBilgisi?.firma === 'MNG Kargo' ? 'selected' : ''}>MNG Kargo</option>
          <option value="PTT Kargo" ${order.kargoBilgisi?.firma === 'PTT Kargo' ? 'selected' : ''}>PTT Kargo</option>
          <option value="Sürat Kargo" ${order.kargoBilgisi?.firma === 'Sürat Kargo' ? 'selected' : ''}>Sürat Kargo</option>
        </select>

        <label>Takip No</label>
        <input id="kargoTakipNo" value="${order.kargoBilgisi?.takipNo || ''}" style="width: 100%; padding: 8px; margin-bottom: 10px;" placeholder="Takip numarası girin">

        <label>Kargo Durumu</label>
        <select id="kargoDurum" style="width: 100%; padding: 8px; margin-bottom: 15px;">
          <option value="Hazırlanıyor" ${order.kargoBilgisi?.durum === 'Hazırlanıyor' ? 'selected' : ''}>Hazırlanıyor</option>
          <option value="Kargoya Verildi" ${order.kargoBilgisi?.durum === 'Kargoya Verildi' ? 'selected' : ''}>Kargoya Verildi</option>
          <option value="Yolda" ${order.kargoBilgisi?.durum === 'Yolda' ? 'selected' : ''}>Yolda</option>
          <option value="Dağıtımda" ${order.kargoBilgisi?.durum === 'Dağıtımda' ? 'selected' : ''}>Dağıtımda</option>
          <option value="Teslim Edildi" ${order.kargoBilgisi?.durum === 'Teslim Edildi' ? 'selected' : ''}>Teslim Edildi</option>
        </select>

        <button onclick="updateKargo('${order._id}')" style="background: #e67e22; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
          Kargo Kaydet
        </button>
      `;

      document.getElementById("orderModal").style.display = "flex";
    } catch (error) {
      console.error('Sipariş detayı yükleme hatası:', error);
      showToast('Sipariş detayı yüklenirken hata oluştu', 'error');
    }
  }

  async function updateStatus(orderId) {
    try {
      const status = document.getElementById("statusSelect").value;

      await fetch(`${API_URL}/orders/${orderId}/status`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token
        },
        body: JSON.stringify({ status })
      });

      showToast("Durum güncellendi ✅", 'success');
      closeModal();
      loadOrders();
    } catch (error) {
      showToast('Durum güncellenirken hata oluştu', 'error');
    }
  }

  async function updateKargo(orderId) {
    try {
      const firma = document.getElementById("kargoFirma").value;
      const takipNo = document.getElementById("kargoTakipNo").value;
      const durum = document.getElementById("kargoDurum").value;

      await fetch(`${API_URL}/admin/orders/${orderId}/kargo`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token
        },
        body: JSON.stringify({ firma, takipNo, durum })
      });

      showToast("Kargo kaydedildi ✅", 'success');
      closeModal();
      loadOrders();
    } catch (error) {
      showToast('Kargo kaydedilirken hata oluştu', 'error');
    }
  }

  function closeModal() {
    document.getElementById("orderModal").style.display = "none";
  }

  // Sayfa yüklendiğinde çalıştır
  loadOrders();
</script>

</body>
</html>
